<!DOCTYPE html>
<html>

<head>

    <style>

        body {
            font-family: Arial;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

    </style>

</head>

<body>

    <h2 align="center">
        SCHOOL REPORT CARD
    </h2>

    <p>
        Learner:
        {{ student.first_name }}
        {{ student.last_name }}
    </p>

    <table>

        <thead>
            <tr>
                <th>Subject</th>
                <th>Marks</th>
                <th>Grade</th>
            </tr>
        </thead>

        <tbody>

            {% for result in results %}

            <tr>

                <td>{{ result.subject }}</td>
                <td>{{ result.marks }}</td>
                <td>{{ result.grade }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</body>
</html>
